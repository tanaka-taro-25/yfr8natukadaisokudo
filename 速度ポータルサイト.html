<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メインポータルサイト</title>
    <style>
        /* ========================
           CSS (デザイン設定)
        ======================== */
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* ヘッダー */
        .header {
            text-align: center;
            padding: 40px 20px;
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        .header p {
            margin: 0;
            font-size: 1rem;
            opacity: 0.9;
        }

        /* メインコンテナ */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* グリッドレイアウト */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        /* カードのデザイン */
        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* ホバー時のアクション */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        /* カード内の要素 */
        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .card-title {
            margin: 0 0 10px 0;
            font-size: 1.25rem;
            color: var(--primary-color);
        }

        .card-desc {
            margin: 0;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #666;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 id="greeting-message">ポータルサイトへようこそ</h1>
        <p>目的のサイトを選択してください。</p>
    </header>

    <main class="container">
        <div class="grid-layout">
            <a href="速度入力サイト１回.html" class="card">
                <div class="card-icon">📊</div>
                <h2 class="card-title">速度１</h2>
                <p class="card-desc">速度１回目</p>
            </a>
            <a href="速度入力サイト２回.html" class="card">
                <div class="card-icon">📊</div>
                <h2 class="card-title">速度２</h2>
                <p class="card-desc">速度２回目</p>
            </a>
            <a href="速度入力サイト ３回.html" class="card">
                <div class="card-icon">📊</div>
                <h2 class="card-title">速度３</h2>
                <p class="card-desc">速度３回目</p>
            </a>
            <a href="速度入力サイト ４回.html" class="card">
                <div class="card-icon">📊</div>
                <h2 class="card-title">速度４</h2>
                <p class="card-desc">速度４回目</p>
            </a>
            <a href="速度入力サイト ５回.html" class="card">
                <div class="card-icon">📊</div>
                <h2 class="card-title">速度５</h2>
                <p class="card-desc">速度５回目</p>
            </a>
        </div>
    </main>

    <script>
        /* ========================
           JavaScript (動的処理)
        ======================== */
        document.addEventListener("DOMContentLoaded", () => {
            const greetingElement = document.getElementById("greeting-message");
            
            // 現在の時間を取得
            const currentHour = new Date().getHours();
            let greetingText = "";

            // 時間帯判定
            if (currentHour >= 5 && currentHour < 11) {
                greetingText = "おはようございます！ポータルへようこそ";
            } else if (currentHour >= 11 && currentHour < 18) {
                greetingText = "こんにちは！ポータルへようこそ";
            } else {
                greetingText = "こんばんは！ポータルへようこそ";
            }

            // HTMLにテキストを反映
            greetingElement.textContent = greetingText;
        });
    </script>
</body>
</html>
